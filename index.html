<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GangtokNest | Sikkim's Trusted Home Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;800&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,500,0,0" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] font-body text-slate-900 antialiased">

    <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100">
        <div class="flex justify-between items-center px-4 py-3 max-w-7xl mx-auto">
            <div class="flex items-center gap-1 cursor-pointer" onclick="location.reload()">
                <span class="material-symbols-outlined text-[#00253b] text-2xl">roofing</span>
                <span class="text-xl font-black text-[#00253b] tracking-tight font-headline">GangtokNest</span>
            </div>
            
            <nav class="flex gap-2">
                <button id="navTenant" onclick="showTenantView()" class="nav-pill px-3 py-2 text-[10px] sm:text-xs">
                    <span class="material-symbols-outlined text-emerald-600 !text-lg">search_check</span>
                    <span>Find</span>
                </button>
                <button id="navLandlord" onclick="showLandlordView()" class="nav-pill nav-active px-3 py-2 text-[10px] sm:text-xs">
                    <span class="material-symbols-outlined text-sky-600 !text-lg">dashboard_customize</span>
                    <span>Portal</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="min-h-screen pt-20 pb-12 flex items-center justify-center px-4">
        <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 overflow-hidden rounded-[2rem] sm:rounded-[3rem] bg-white shadow-2xl">
            
            <div class="relative hidden lg:block overflow-hidden group">
                <img class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" 
                     src="https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?q=80&w=1000">
                <div class="absolute inset-0 bg-gradient-to-t from-[#00253b] via-[#00253b]/40 to-transparent z-10"></div>
                <div class="relative z-20 h-full p-16 flex flex-col justify-end">
                    <h2 class="text-5xl font-headline font-extrabold text-white leading-tight">Elevated Living.<br><span class="text-sky-300">Simplified.</span></h2>
                </div>
            </div>

            <div class="p-6 sm:p-12 lg:p-16 flex flex-col justify-center">
                
                <div id="authView">
                    <h1 class="text-3xl sm:text-4xl font-headline font-black mb-2 text-[#00253b]">Welcome.</h1>
                    <p class="text-slate-400 mb-8 text-sm">Sign in to manage your premium listings.</p>
                    <div class="space-y-4">
                        <input id="authEmail" type="email" class="input-style" placeholder="Email Address">
                        <div class="relative">
                            <input id="authPassword" type="password" class="input-style pr-12" placeholder="Password">
                            <button onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                                <span id="passwordIcon" class="material-symbols-outlined">visibility</span>
                            </button>
                        </div>
                        <div class="flex gap-3 pt-4">
                            <button onclick="handleAuth('login')" class="primary-btn flex-1">Sign In</button>
                            <button onclick="handleAuth('signup')" class="border-btn flex-1">Sign Up</button>
                        </div>
                    </div>
                </div>

                <div id="landlordView" class="hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-headline font-black text-slate-800">New Listing</h1>
                        <button onclick="signOut()" class="text-red-500 font-bold text-xs uppercase tracking-widest">Logout</button>
                    </div>
                    <form id="landlordForm" class="space-y-4">
                        <input id="title" class="input-style" placeholder="Property Title" required>
                        <input id="loc" class="input-style" placeholder="Locality (e.g. Tadong)" required>
                        <div class="grid grid-cols-2 gap-4">
                            <input id="price" type="number" class="input-style" placeholder="Rent (₹)" required>
                            <div class="space-y-1">
                                <input id="phone" type="tel" class="input-style" placeholder="10-digit Phone" required>
                                <span id="phoneError" class="text-[10px] text-red-500 font-bold ml-2 hidden italic">INVALID PHONE</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <select id="water" class="input-style"><option>24/7 Water</option><option>Scheduled</option></select>
                            <select id="washroom" class="input-style"><option>Attached Washroom</option><option>Shared</option></select>
                        </div>
                        <input id="roomPhoto" type="file" accept="image/*" class="input-style py-3 bg-slate-50 border-dashed border-2 text-xs">
                        <button type="submit" id="submitBtn" class="primary-btn mt-2">Post My Room</button>
                    </form>
                </div>

                <div id="tenantView" class="hidden">
                    <div class="flex justify-between items-end mb-4">
                        <h1 class="text-2xl sm:text-3xl font-headline font-black text-[#00253b]">Find Your Nest</h1>
                        <span id="resultCount" class="text-[10px] font-bold text-slate-400 pb-1 uppercase tracking-widest"></span>
                    </div>
                    <div class="flex gap-2 mb-6 bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                        <input id="locSearch" class="flex-1 bg-transparent px-3 py-1.5 outline-none text-sm font-medium" placeholder="Search area...">
                        <button onclick="searchRooms()" class="bg-[#00253b] text-white px-4 py-1.5 rounded-lg font-bold text-xs">Search</button>
                    </div>
                    <div id="roomContainer" class="space-y-6 max-h-[450px] overflow-y-auto pr-1"></div>
                </div>

            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
